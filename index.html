<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="L'Âme du Grill Anatolien — Cuisine traditionnelle, charbon de bois et hospitalité turque au cœur de Paris.">
    <title>L'Âme du Grill Anatolien · Accueil</title>

    <link rel="preconnect" href="<https://fonts.googleapis.com>">
    <link rel="preconnect" href="<https://fonts.gstatic.com>" crossorigin>
    <link href="<https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600;700&display=swap>" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================== HEADER / NAVIGATION ================== -->
    <header>
        <a href="index.html" class="logo" aria-label="Accueil">◈</a>

        <nav id="primary-nav">
            <ul>
                <li><a href="index.html" class="active">Accueil</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="experience.html">Expérience</a></li>
                <li><a href="boissons.html">Boissons</a></li>
                <li><a href="galerie.html">Galerie</a></li>
                <li><a href="reservation.html">Réservation</a></li>
            </ul>
        </nav>

        <button class="menu-btn" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="primary-nav">☰</button>
    </header>

    <!-- ================== MAIN ================== -->
    <main>

        <!-- 01 · HERO -->
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">L'ÂME<br>DU GRILL<br>ANATOLIEN</h1>
            <p class="subtitle">Héritage. Saveurs. Générosité.</p>
            <a href="experience.html" class="btn">
                Découvrir notre univers
                <span aria-hidden="true">→</span>
            </a>
        </section>

        <!-- 02 · FEATURES -->
        <section class="features" aria-label="Notre univers">
            <a href="experience.html" class="feature-card">
                <img
                    src="<https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=800&q=80>"
                    alt=""
                    loading="lazy">
                <h3>Un lieu<br>chargé d'histoire</h3>
            </a>

            <a href="menu.html" class="feature-card">
                <img
                    src="<https://images.unsplash.com/photo-1544025162-81111420d4d8?auto=format&fit=crop&w=800&q=80>"
                    alt=""
                    loading="lazy">
                <h3>Des saveurs<br>authentiques</h3>
            </a>

            <a href="reservation.html" class="feature-card">
                <img
                    src="<https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=800&q=80>"
                    alt=""
                    loading="lazy">
                <h3>Une expérience<br>intemporelle</h3>
            </a>
        </section>

    </main>

    <!-- ================== SCRIPTS ================== -->
    <script>
        // Burger mobile : toggle du menu
        const burger = document.querySelector('.menu-btn');
        const nav = document.querySelector('#primary-nav');

        burger.addEventListener('click', () => {
            const isOpen = nav.classList.toggle('open');
            burger.setAttribute('aria-expanded', isOpen);
            burger.textContent = isOpen ? '✕' : '☰';
        });

        // Ferme le menu après clic sur un lien (mobile)
        nav.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => {
                nav.classList.remove('open');
                burger.setAttribute('aria-expanded', 'false');
                burger.textContent = '☰';
            });
        });
    </script>

</body>
</html>
